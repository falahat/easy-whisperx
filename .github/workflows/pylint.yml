name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev,transcribe]
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        # src is held to full strictness. tests additionally relax the rules that
        # only fight pytest's conventions — fixtures injected by name (redefined /
        # unused) and the near-identical setup blocks pylint reads as duplication.
        # These are config-level relaxations scoped to tests, not inline disables.
        pylint src
        pylint tests --disable=redefined-outer-name,unused-argument,duplicate-code
